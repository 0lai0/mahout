# Rustdoc build and validation for qdp-core.
# Ensures all public API items are documented and documentation compiles
# without warnings. Treats doc warnings as errors via RUSTDOCFLAGS.
name: Rustdoc Build Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'qdp/**'
      - '.github/workflows/rustdoc.yml'

jobs:
  rustdoc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            qdp/target
          key: ${{ runner.os }}-cargo-doc-${{ hashFiles('qdp/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-doc-

      - name: Build rustdoc (warnings = errors)
        working-directory: qdp
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --no-deps 2>&1

      - name: Verify doc output exists
        run: |
          if [ ! -d "qdp/target/doc/qdp_core" ]; then
            echo "::error::rustdoc output not found at qdp/target/doc/qdp_core"
            exit 1
          fi
          echo "✅ rustdoc generated successfully"
